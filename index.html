
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empowerment Career Hub | Impact-Led Growth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/23.1.3/tween.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #020617;
      --accent-violet: #8b5cf6;
      --accent-cyan: #06b6d4;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-deep);
      color: #f8fafc;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    .gradient-tech {
      background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
    }
    .gradient-action {
      background: linear-gradient(90deg, #8b5cf6 0%, #06b6d4 100%);
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }
    .glow-cyan {
      box-shadow: 0 0 40px rgba(6, 182, 212, 0.3);
    }
    .glow-orange {
      box-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }
    .animate-float { animation: float 6s ease-in-out infinite; }

    @keyframes pulse-ring {
      0% { transform: scale(0.33); opacity: 0; }
      80%, 100% { opacity: 0; }
    }
    
    .chat-scroll::-webkit-scrollbar { width: 4px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    
    .role-card:hover {
      transform: translateY(-15px) scale(1.02);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(30, 41, 59, 0.8);
    }

    .hologram-input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: white;
      transition: all 0.3s ease;
    }
    .hologram-input:focus {
      border-color: var(--accent-cyan);
      background: rgba(6, 182, 212, 0.05);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
    }
    
    /* Smooth transitions for view switching */
    .view-transition-enter { opacity: 0; transform: translateY(20px); }
    .view-transition-enter-active { opacity: 1; transform: translateY(0); transition: all 0.5s ease; }
    .view-transition-exit { opacity: 1; transform: translateY(0); }
    .view-transition-exit-active { opacity: 0; transform: translateY(-20px); transition: all 0.5s ease; }

    /* Custom Checkbox Animation */
    .custom-checkbox {
      appearance: none;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
      position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .custom-checkbox:checked {
      background: var(--accent-cyan);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
    }
    .custom-checkbox:checked::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #020617;
      font-weight: 900;
      font-size: 14px;
    }
  </style>
<script type="importmap">
{

  }
}
</script>

</head>

</html>
